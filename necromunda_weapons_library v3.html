<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Necromunda Weapons Library</title>
<style>
:root{--font-sans:system-ui,-apple-system,sans-serif;--color-bg:#fff;--color-bg2:#f5f5f4;--color-bg3:#eeecea;--color-bg-info:#e6f1fb;--color-bg-danger:#fcebeb;--color-text:#1a1a18;--color-text2:#5f5e5a;--color-text3:#888780;--color-text-info:#185fa5;--color-text-danger:#a32d2d;--color-text-warn:#854f0b;--color-text-ok:#3b6d11;--color-border:rgba(0,0,0,0.12);--color-border2:rgba(0,0,0,0.25);--color-border3:rgba(0,0,0,0.35);--color-border-info:#85b7eb;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--color-bg:#1c1c1a;--color-bg2:#2a2a27;--color-bg3:#232320;--color-bg-info:#042c53;--color-text:#f0ede8;--color-text2:#b4b2a9;--color-text3:#888780;--color-text-info:#85b7eb;--color-border:rgba(255,255,255,0.1);--color-border2:rgba(255,255,255,0.2);--color-border3:rgba(255,255,255,0.3)}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-bg3);color:var(--color-text);padding:1rem 1.5rem}
input,select,textarea,button{font-family:var(--font-sans);color:var(--color-text);background:var(--color-bg);border:0.5px solid var(--color-border2);border-radius:var(--r);padding:6px 10px;outline:none}
input:focus,select:focus{box-shadow:0 0 0 2px var(--color-border-info)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
.app{position:relative}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px;font-weight:500}
.header .sub{font-size:13px;color:var(--color-text2);margin-top:2px}
.cat-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem}
.cat-tab{padding:5px 12px;font-size:12px;border:0.5px solid var(--color-border2);border-radius:var(--r);cursor:pointer;background:transparent;color:var(--color-text2)}
.cat-tab.active{background:var(--color-bg2);color:var(--color-text);border-color:var(--color-border3);font-weight:500}
.cat-tab:hover:not(.active){background:var(--color-bg2)}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.toolbar input{flex:1;min-width:160px;font-size:13px}
.btn{padding:5px 12px;font-size:13px;border:0.5px solid var(--color-border2);border-radius:var(--r);cursor:pointer;background:transparent;color:var(--color-text);white-space:nowrap}
.btn:hover{background:var(--color-bg2)}
.btn.primary{background:var(--color-bg-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.btn.danger{color:var(--color-text-danger);border-color:#f09595}
.table-wrap{overflow-x:auto;border:0.5px solid var(--color-border);border-radius:var(--rl)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 10px;text-align:left;font-weight:500;font-size:11px;color:var(--color-text2);border-bottom:0.5px solid var(--color-border);background:var(--color-bg2);white-space:nowrap;cursor:pointer;user-select:none;position:relative}
th:hover{color:var(--color-text)}
th .sort-icon{margin-left:4px;opacity:0.4;font-size:10px}
th.sort-asc .sort-icon,th.sort-desc .sort-icon{opacity:1;color:var(--color-text-info)}
td{padding:7px 10px;border-bottom:0.5px solid var(--color-border);color:var(--color-text);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-bg2)}
tr.main-entry td{background:#FAEEDA}
tr.main-entry:hover td{background:#FAC775}
@media(prefers-color-scheme:dark){tr.main-entry td{background:#412402}tr.main-entry:hover td{background:#633806}}
td.wrap{white-space:normal;max-width:200px}
.al{display:inline-block;padding:1px 6px;border-radius:var(--r);font-size:11px;font-weight:500}
.al-C{background:#EAF3DE;color:#3B6D11}
.al-R{background:#E6F1FB;color:#185FA5}
.al-I{background:#FAEEDA;color:#854F0B}
.al-E{background:#EEEDFE;color:#3C3489}
.al-x{background:var(--color-bg2);color:var(--color-text2)}
.check-badge{font-size:10px;background:#EF9F27;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}
.empty{text-align:center;padding:2rem;color:var(--color-text2);font-size:14px}
.count{font-size:12px;color:var(--color-text2)}
.col-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.col-filters label{font-size:11px;color:var(--color-text2)}
.col-filters select{font-size:12px;padding:4px 8px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem;align-items:center}
.filter-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--color-bg-info);color:var(--color-text-info);border:0.5px solid var(--color-border-info);cursor:pointer;display:flex;align-items:center;gap:4px}
.filter-pill:hover{opacity:0.8}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-start;justify-content:center;padding-top:4rem}
.modal-bg.open{display:flex}
.modal{background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:var(--rl);padding:1.25rem;width:min(520px,90vw);max-height:80vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:500;margin-bottom:1rem}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:var(--color-text2);margin-bottom:3px}
.field input,.field textarea{width:100%;font-size:13px}
.field textarea{min-height:50px;resize:vertical}
.field-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:8px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
</style>
</head>
<body>
<div class="app">
<h2 class="sr-only">Necromunda weapons library — full weapon reference with column filtering and sorting</h2>
<div class="header">
  <div><h1>Necromunda weapons library</h1><div class="sub">All weapons loaded</div></div>
  <span class="count" id="count-label"></span>
</div>
<div class="cat-tabs" id="cat-tabs"></div>
<div class="toolbar">
  <input type="text" id="search" placeholder="Search name, traits, notes..." />
  <button class="btn primary" id="add-btn">+ Add</button>
</div>
<div class="col-filters" id="col-filters"></div>
<div id="active-filters" class="filter-row"></div>
<div class="table-wrap">
  <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2 id="modal-title">Add weapon</h2>
    <div id="modal-fields"></div>
    <div class="modal-actions">
      <button class="btn" id="m-cancel">Cancel</button>
      <button class="btn danger" id="m-delete" style="display:none">Delete</button>
      <button class="btn primary" id="m-save">Save</button>
    </div>
  </div>
</div>

let state={cat:"Basic",search:"",colFilters:{},sortCol:null,sortDir:1,editIdx:null,data:{}};

function init(){
  for(const k of CATS) state.data[k]=[...BAKED[k]];
  loadFromStorage();
}

async function loadFromStorage(){
  for(const k of CATS){
    try{const r=await window.storage.get("necro_final_"+k);if(r)state.data[k]=JSON.parse(r.value);}catch(e){}
  }
  render();
}

async function save(k){try{await window.storage.set("necro_final_"+k,JSON.stringify(state.data[k]));}catch(e){}}

function alClass(al){
  if(!al||al==="-")return"al al-x";
  if(al==="E")return"al al-E";
  if(al.startsWith("I"))return"al al-I";
  if(al.startsWith("R"))return"al al-R";
  if(al==="C"||al==="c")return"al al-C";
  return"al al-x";
}

function getUniqueVals(key){
  const vals=new Set();
  (state.data[state.cat]||[]).forEach(w=>{
    const v=(w[key]||"-").trim();
    if(v&&v!=="-")vals.add(v);
  });
  return [...vals].sort();
}

function render(){renderCatTabs();renderColFilters();renderActiveFilters();renderTable();}

function renderCatTabs(){
  document.getElementById("cat-tabs").innerHTML=CATS.map(c=>`<button class="cat-tab${state.cat===c?" active":""}" onclick="switchCat('${c}')">${c} <span style="font-size:10px;opacity:0.7">${state.data[c].length}</span></button>`).join("");
}

function renderColFilters(){
  const el=document.getElementById("col-filters");
  el.innerHTML=`<span style="font-size:11px;color:var(--color-text2);margin-right:4px">Filter by:</span>`+
  FILTERABLE.map(key=>{
    const vals=getUniqueVals(key);
    const cur=state.colFilters[key]||"";
    return `<select style="font-size:12px;padding:4px 8px" onchange="setColFilter('${key}',this.value)">
      <option value="">${FILTER_LABELS[key]}</option>
      ${vals.map(v=>`<option value="${v}"${v===cur?" selected":""}>${v}</option>`).join("")}
    </select>`;
  }).join("");
}

function renderActiveFilters(){
  const el=document.getElementById("active-filters");
  const active=Object.entries(state.colFilters).filter(([k,v])=>v);
  if(!active.length){el.innerHTML="";return;}
  el.innerHTML=active.map(([k,v])=>`<span class="filter-pill" onclick="clearColFilter('${k}')"><span>${FILTER_LABELS[k]}: ${v}</span><span style="font-size:12px;margin-left:2px">×</span></span>`).join("")+
  `<button class="btn" style="font-size:11px;padding:2px 8px" onclick="clearAllFilters()">Clear all</button>`;
}

function setColFilter(key,val){state.colFilters[key]=val;renderColFilters();renderActiveFilters();renderTable();}
function clearColFilter(key){delete state.colFilters[key];renderColFilters();renderActiveFilters();renderTable();}
function clearAllFilters(){state.colFilters={};renderColFilters();renderActiveFilters();renderTable();}

function getFiltered(){
  return (state.data[state.cat]||[]).filter(w=>{
    const q=state.search.toLowerCase();
    if(q&&!Object.values(w).some(v=>String(v).toLowerCase().includes(q)))return false;
    for(const[key,val]of Object.entries(state.colFilters)){
      if(val&&String(w[key]||"").trim()!==val)return false;
    }
    return true;
  });
}

function getSorted(rows){
  if(!state.sortCol)return rows;
  const key=COL_KEYS[state.sortCol];
  return [...rows].sort((a,b)=>{
    const av=String(a[key]||"").toLowerCase();
    const bv=String(b[key]||"").toLowerCase();
    const an=parseFloat(av.replace(/[^0-9.\-]/g,""));
    const bn=parseFloat(bv.replace(/[^0-9.\-]/g,""));
    if(!isNaN(an)&&!isNaN(bn))return(an-bn)*state.sortDir;
    return av.localeCompare(bv)*state.sortDir;
  });
}

function renderTable(){
  const filtered=getFiltered();
  const rows=getSorted(filtered);
  const total=state.data[state.cat].length;
  document.getElementById("count-label").textContent=rows.length===total?`${total} entries`:`${rows.length} of ${total}`;
  document.getElementById("thead").innerHTML=`<tr>${COLS.map((c,i)=>{
    const isSorted=state.sortCol===i;
    const icon=isSorted?(state.sortDir===1?"▲":"▼"):"▲";
    return`<th class="${isSorted?(state.sortDir===1?"sort-asc":"sort-desc"):""}" onclick="toggleSort(${i})">${c}<span class="sort-icon">${icon}</span></th>`;
  }).join("")}<th></th></tr>`;
  if(!rows.length){document.getElementById("tbody").innerHTML=`<tr><td colspan="${COLS.length+1}" class="empty">No results</td></tr>`;return;}
  let mainCount=0;
  document.getElementById("tbody").innerHTML=rows.map((w)=>{
    const chk=CHECK.includes(w.name);
    const isSub=w.name.startsWith("-");
    if(!isSub) mainCount++;
    const highlight=!isSub&&(mainCount%2===1);
    return`<tr class="${highlight?"main-entry":""}">
      <td style="font-weight:${isSub?"400":"500"};color:${isSub?"var(--color-text2)":"var(--color-text)"}">${w.name}${chk?`<span class="check-badge">check</span>`:""}</td>
      <td>${w.rangeS||"-"}</td><td>${w.rangeL||"-"}</td><td>${w.accS||"-"}</td><td>${w.accL||"-"}</td>
      <td>${w.str||"-"}</td><td>${w.ap||"-"}</td><td>${w.dmg||"-"}</td><td>${w.am||"-"}</td>
      <td><span class="${alClass(w.al)}">${w.al||"-"}</span></td>
      <td>${w.credits||"-"}</td>
      <td class="wrap" style="white-space:normal;max-width:200px;font-size:11px;color:var(--color-text2)">${w.traits||""}</td>
      <td style="font-size:11px;color:var(--color-text2);max-width:100px;overflow:hidden;text-overflow:ellipsis">${w.notes||""}</td>
      <td><button class="btn" style="padding:2px 8px;font-size:11px" onclick="openEdit('${w.name.replace(/'/g,"\\'")}','${(w.traits||"").replace(/'/g,"\\'")}')">Edit</button></td>
    </tr>`;
  }).join("");
}

function toggleSort(i){
  if(state.sortCol===i)state.sortDir*=-1;
  else{state.sortCol=i;state.sortDir=1;}
  renderTable();
}

function switchCat(c){state.cat=c;state.search="";state.colFilters={};state.sortCol=null;state.sortDir=1;document.getElementById("search").value="";renderColFilters();renderActiveFilters();renderCatTabs();renderTable();}
document.getElementById("search").oninput=e=>{state.search=e.target.value;renderTable();};
document.getElementById("add-btn").onclick=()=>openModal(null,null);

function openModal(w,ri){
  state.editIdx=ri;
  const d=w||{};
  document.getElementById("modal-title").textContent=w?"Edit weapon":"Add weapon";
  document.getElementById("m-delete").style.display=w?"inline-block":"none";
  const F=(k,l,v,ph="")=>`<div class="field"><label>${l}</label><input id="f_${k}" type="text" value="${String(v||"").replace(/"/g,"&quot;")}" placeholder="${ph}"></div>`;
  document.getElementById("modal-fields").innerHTML=`
    ${F("name","Name",d.name,"")}
    <div class="field-row">${F("rangeS","Short range",d.rangeS,"-")}${F("rangeL","Long range",d.rangeL,"-")}${F("accS","Acc S",d.accS,"-")}${F("accL","Acc L",d.accL,"-")}</div>
    <div class="field-row">${F("str","S",d.str,"-")}${F("ap","AP",d.ap,"-")}${F("dmg","D",d.dmg,"-")}${F("am","Am",d.am,"-")}</div>
    <div class="field-row">${F("al","AL",d.al,"-")}${F("credits","Credits",d.credits,"-")}</div>
    <div class="field"><label>Traits</label><textarea id="f_traits">${d.traits||""}</textarea></div>
    <div class="field"><label>Notes</label><input id="f_notes" type="text" value="${String(d.notes||"").replace(/"/g,"&quot;")}"></div>`;
  document.getElementById("modal-bg").classList.add("open");
}

function openEdit(name,traits){
  const ri=state.data[state.cat].findIndex(x=>x.name===name&&x.traits===traits);
  if(ri<0)return;
  openModal(state.data[state.cat][ri],ri);
}

document.getElementById("m-cancel").onclick=closeModal;
document.getElementById("modal-bg").onclick=e=>{if(e.target===document.getElementById("modal-bg"))closeModal();};
document.getElementById("m-save").onclick=async()=>{
  const g=k=>{const el=document.getElementById("f_"+k);return el?el.value.trim():"";};
  const wn={name:g("name"),rangeS:g("rangeS"),rangeL:g("rangeL"),accS:g("accS"),accL:g("accL"),str:g("str"),ap:g("ap"),dmg:g("dmg"),am:g("am"),al:g("al"),credits:g("credits"),traits:g("traits"),notes:g("notes")};
  if(!wn.name){document.getElementById("f_name").style.borderColor="var(--color-border-danger)";return;}
  const data=[...state.data[state.cat]];
  if(state.editIdx!==null&&state.editIdx!==undefined)data[state.editIdx]=wn;
  else data.push(wn);
  state.data[state.cat]=data;
  await save(state.cat);
  closeModal();render();
};
document.getElementById("m-delete").onclick=async()=>{
  if(!confirm("Delete this weapon?"))return;
  state.data[state.cat]=state.data[state.cat].filter((_,i)=>i!==state.editIdx);
  await save(state.cat);
  closeModal();render();
};
function closeModal(){document.getElementById("modal-bg").classList.remove("open");state.editIdx=null;}
init();
</script>
</body>
</html>
